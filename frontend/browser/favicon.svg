<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2345"/>
      <stop offset="50%" stop-color="#14305c"/>
      <stop offset="100%" stop-color="#102850"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>
  <!-- Main 4-point sparkle (center) -->
  <g transform="translate(256,236)">
    <path d="M0,-120 C6,-40 40,-6 120,0 C40,6 6,40 0,120 C-6,40 -40,6 -120,0 C-40,-6 -6,-40 0,-120Z" fill="url(#sparkGrad)"/>
  </g>
  <!-- Small 4-point sparkle (top-right) -->
  <g transform="translate(400,120)">
    <path d="M0,-48 C3,-16 16,-3 48,0 C16,3 3,16 0,48 C-3,16 -16,3 -48,0 C-16,-3 -3,-16 0,-48Z" fill="#fff" opacity="0.85"/>
  </g>
  <!-- Small 4-point sparkle (bottom-left) -->
  <g transform="translate(125,385)">
    <path d="M0,-40 C2,-13 13,-2 40,0 C13,2 2,13 0,40 C-2,13 -13,2 -40,0 C-13,-2 -2,-13 0,-40Z" fill="#fff" opacity="0.7"/>
  </g>
  <!-- Tiny sparkle (top-left) -->
  <g transform="translate(148,148)">
    <path d="M0,-22 C2,-7 7,-2 22,0 C7,2 2,7 0,22 C-2,7 -7,2 -22,0 C-7,-2 -2,-7 0,-22Z" fill="#fff" opacity="0.55"/>
  </g>
  <!-- Tiny sparkle (bottom-right) -->
  <g transform="translate(388,340)">
    <path d="M0,-26 C2,-9 9,-2 26,0 C9,2 2,9 0,26 C-2,9 -9,2 -26,0 C-9,-2 -2,-9 0,-26Z" fill="#fff" opacity="0.6"/>
  </g>
</svg>
